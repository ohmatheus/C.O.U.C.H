whisper_model: large-v3        # tiny / base / small / medium / large-v3
whisper_device: cpu            # cpu (recommended) or cuda
llm_model: qwen2.5:7b
llm_keepalive: -1              # never unload from VRAM

server_host: 0.0.0.0
server_port: 8765
server_url: ws://localhost:8765  # change to Pi address for split setup

language: fr
wake_word: hey_couch

feedback_device: default       # audio output device name
feedback_mode: beep            # beep (wav files) or tts (piper-tts)
tts_model: fr_FR-siwis-medium  # piper french model, only used if feedback_mode: tts
