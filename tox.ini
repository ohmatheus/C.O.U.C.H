[tox]
env_list = qa, py312, fixqa
min_version = 4.0
skip_missing_interpreters = true

[testenv]
skip_install = true
allowlist_externals = uv

[testenv:py312]
description = Run tests on Python 3.12
commands_pre =
    uv sync --active --locked
commands =
    uv run pytest tests/

[testenv:qa]
description = Static analysis (ruff, mypy)
commands_pre =
    uv sync --active --locked
commands =
    uv run ruff format --quiet --diff client/ server/
    uv run ruff check --quiet client/ server/
    uv run mypy

[testenv:fixqa]
description = Auto-fix style issues with ruff
commands_pre =
    uv sync --active --locked
commands =
    uv run ruff format client/ server/
    uv run ruff check --fix client/ server/
